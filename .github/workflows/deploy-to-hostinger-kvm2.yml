name: Deploy to Hostinger KVM2

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: hostinger-kvm2-main
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: "pip"

      - name: Create Virtual Environment
        run: |
          python -m venv venv

      - name: Install Dependencies
        run: |
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python Files
        run: |
          source venv/bin/activate
          python -m compileall main.py app create_tables.py seed.py

  deploy:
    name: Deploy To Hostinger VPS
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "echo SSH CONNECTION SUCCESS"

      - name: Create Application Directory
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "
              mkdir -p '${{ secrets.HOSTINGER_APP_DIR }}'
            "

      - name: Sync Project Files
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude '.mypy_cache/' \
            --exclude 'node_modules/' \
            --exclude 'app/public/uploads/' \
            --exclude 'public/uploads/' \
            --exclude 'backend/app/public/uploads/' \
            --exclude 'backend/public/uploads/' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_APP_DIR }}/"

      - name: Install Dependencies And Restart Application
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "
              set -e

              cd '${{ secrets.HOSTINGER_APP_DIR }}'

              if [ ! -d venv ]; then
                python3 -m venv venv
              fi

              source venv/bin/activate

              python -m pip install --upgrade pip

              pip install -r requirements.txt

              mkdir -p app/public/uploads
              mkdir -p public/uploads
              mkdir -p backend/app/public/uploads
              mkdir -p backend/public/uploads

              sudo pkill -f 'uvicorn main:app' || true

              nohup venv/bin/uvicorn main:app \
                --host 0.0.0.0 \
                --port 8000 \
                > uvicorn.log 2>&1 &

              sleep 5

              if pgrep -f 'uvicorn main:app' > /dev/null; then
                echo 'Application Started Successfully'
              else
                echo 'Application Failed To Start'
                cat uvicorn.log
                exit 1
              fi
            "

      - name: Verify Deployment
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
            "
              ps aux | grep uvicorn
            "
