name: Deploy to Hostinger KVM2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-kvm2-main
  cancel-in-progress: true

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          source venv/bin/activate
          python -m compileall main.py app create_tables.py seed.py

  deploy:
    name: Deploy to server
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$HOSTINGER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$HOSTINGER_SSH_PORT" "$HOSTINGER_HOST" >> ~/.ssh/known_hosts
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Create and set permissions for target directory
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          export SSHPASS="$HOSTINGER_PASSWORD"
          sshpass -e ssh -v -o StrictHostKeyChecking=no -p "${HOSTINGER_SSH_PORT}" \
            "${HOSTINGER_USER}@${HOSTINGER_HOST}" "
            sudo mkdir -p '${HOSTINGER_APP_DIR}'
            sudo chown -R ${HOSTINGER_USER}:${HOSTINGER_USER} '${HOSTINGER_APP_DIR}'
          "
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_APP_DIR: ${{ secrets.HOSTINGER_APP_DIR }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}

      - name: Sync files to Hostinger
        run: |
          export SSHPASS="$HOSTINGER_PASSWORD"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude '.mypy_cache/' \
            --exclude 'app/public/uploads/' \
            --exclude 'public/uploads/' \
            --exclude 'backend/app/public/uploads/' \
            --exclude 'backend/public/uploads/' \
            -e "sshpass -e ssh -o StrictHostKeyChecking=no -p ${HOSTINGER_SSH_PORT}" \
            ./ \
            "${HOSTINGER_USER}@${HOSTINGER_HOST}:${HOSTINGER_APP_DIR}/"
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_APP_DIR: ${{ secrets.HOSTINGER_APP_DIR }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}

      - name: Install dependencies and restart service
        run: |
          export SSHPASS="$HOSTINGER_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=no -p "${HOSTINGER_SSH_PORT}" \
            "${HOSTINGER_USER}@${HOSTINGER_HOST}" "
            set -euo pipefail
            cd '${HOSTINGER_APP_DIR}'
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            mkdir -p app/public/uploads public/uploads backend/app/public/uploads backend/public/uploads
            # Check if systemd service is configured and loaded
            if command -v systemctl >/dev/null 2>&1 && [ -n "${HOSTINGER_SERVICE_NAME:-}" ] && systemctl show "${HOSTINGER_SERVICE_NAME}" --property=LoadState 2>/dev/null | grep -q "LoadState=loaded"; then
              echo \"Systemd service detected. Restarting service...\"
              sudo systemctl restart \"${HOSTINGER_SERVICE_NAME}\"
              sudo systemctl --no-pager --full status \"${HOSTINGER_SERVICE_NAME}\"
            else
              echo \"Systemd service not found or not loaded. Running in background with nohup...\"
              # Kill any existing process running on port 8000 or matching uvicorn main:app
              sudo fuser -k 8000/tcp || pkill -f \"uvicorn main:app\" || true
              # Run in background with nohup, redirecting stdin/stdout/stderr to prevent termination and terminal hang
              nohup venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 < /dev/null &
              # Wait a moment to check if it started successfully
              sleep 3
              if pgrep -f \"uvicorn main:app\" > /dev/null; then
                echo \"Application started successfully in the background!\"
              else
                echo \"Application failed to start. Showing log file:\"
                cat uvicorn.log
                exit 1
              fi
            fi
          "
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_APP_DIR: ${{ secrets.HOSTINGER_APP_DIR }}
          HOSTINGER_SERVICE_NAME: ${{ secrets.HOSTINGER_SERVICE_NAME }}
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
